name: Shell CI

on:
  push:
    branches: [main, 'scenario/*']
    paths:
      - 'apps/shell/**'
  pull_request:
    paths:
      - 'apps/shell/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shell

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Upload project-manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: shell-manifest
          path: apps/shell/project-manifest.json
          retention-days: 30
